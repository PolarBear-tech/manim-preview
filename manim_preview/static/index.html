<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
		<meta http-equiv="X-UA-Compatible" content="ie=edge">
		<title>Manim Live Preview</title>
		<link rel="stylesheet" href="/static/style.css">
	</head>

	<body>
		<h2>Manim Preview</h2>
		<div id="status-bar" class="status-bar idle">状态：空闲</div>
		<!-- 视频容器，开启原生controls控件 -->
		<div class="video-wrap">
			<div class="video-tip" id="video-placeholder">等待渲染视频...</div>
			<video id="player" loop autoplay muted preload="auto" controls style="display: none;"></video>
		</div>
		<div id="log-panel">等待渲染日志...</div>

		<script src="/static/script.js"></script>
	</body>
</html>
